<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FabGuardian – Live Fab Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg:        #080c10;
    --surface:   #0d1520;
    --border:    #1a2840;
    --accent:    #00d4ff;
    --green:     #00ff88;
    --yellow:    #ffb800;
    --red:       #ff3b5c;
    --text:      #c8d8e8;
    --muted:     #4a6080;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, #080c10 0%, #0a1218 100%);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), #0060ff);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; color: #fff; }
  .logo-sub  { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .header-right { display: flex; align-items: center; gap: 20px; }

  .conn-badge {
    display: flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 11px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: rgba(0,212,255,0.04);
  }

  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  .conn-dot.error { background: var(--red); }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .clock { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  /* ── Layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 63px);
  }

  /* ── Machine grid ── */
  .machines-panel {
    padding: 20px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  .panel-title {
    font-size: 10px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  .panel-title::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  .machines-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  .machine-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }

  .machine-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--green);
    transition: background 0.3s;
  }

  .machine-card.warning::before  { background: var(--yellow); }
  .machine-card.critical::before { background: var(--red); }
  .machine-card.critical {
    border-color: rgba(255,59,92,0.35);
    box-shadow: 0 0 20px rgba(255,59,92,0.08);
  }
  .machine-card.warning {
    border-color: rgba(255,184,0,0.3);
    box-shadow: 0 0 20px rgba(255,184,0,0.06);
  }

  .card-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 14px;
  }

  .machine-id {
    font-family: var(--mono);
    font-size: 15px; font-weight: 600;
    color: #fff;
    letter-spacing: 1px;
  }

  .machine-type {
    font-size: 10px; color: var(--muted);
    margin-top: 2px;
  }

  .status-badge {
    font-family: var(--mono);
    font-size: 10px; font-weight: 600;
    padding: 3px 9px;
    border-radius: 12px;
    letter-spacing: 1px;
    border: 1px solid;
  }

  .status-badge.NORMAL   { color: var(--green);  border-color: rgba(0,255,136,0.3);  background: rgba(0,255,136,0.08);  }
  .status-badge.WARNING  { color: var(--yellow); border-color: rgba(255,184,0,0.3);  background: rgba(255,184,0,0.08);  }
  .status-badge.CRITICAL { color: var(--red);    border-color: rgba(255,59,92,0.35); background: rgba(255,59,92,0.08);  animation: flashbadge 0.8s infinite; }

  @keyframes flashbadge { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  /* Sensor metrics */
  .metrics {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 14px;
  }

  .metric {
    background: rgba(0,0,0,0.2);
    border-radius: 6px; padding: 8px 10px;
  }

  .metric-label {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.5px; margin-bottom: 3px;
  }

  .metric-value {
    font-family: var(--mono);
    font-size: 14px; color: #fff;
    font-weight: 600;
  }

  .metric-value.warn { color: var(--yellow); }
  .metric-value.crit { color: var(--red); }

  /* Wear bar */
  .wear-section { margin-top: 4px; }
  .wear-label {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--muted); margin-bottom: 5px;
  }

  .wear-bar {
    height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }

  .wear-fill {
    height: 100%; border-radius: 2px;
    background: var(--green);
    transition: width 0.5s ease, background 0.3s;
  }

  /* Mini chart */
  .mini-chart { margin-top: 12px; height: 50px; }

  /* Agent thinking indicator */
  .thinking-overlay {
    position: absolute; inset: 0;
    background: rgba(0,212,255,0.04);
    border: 1px solid rgba(0,212,255,0.25);
    border-radius: 10px;
    display: none;
    align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 11px; color: var(--accent);
    gap: 8px;
  }

  .thinking-overlay.active { display: flex; }

  .thinking-dots span {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: var(--accent);
    animation: thinkdot 1.2s infinite;
    margin: 0 2px;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes thinkdot { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  /* Anomaly tag */
  .anomaly-tag {
    margin-top: 8px;
    font-family: var(--mono); font-size: 10px;
    color: var(--yellow);
    background: rgba(255,184,0,0.08);
    border: 1px solid rgba(255,184,0,0.2);
    border-radius: 4px;
    padding: 4px 8px;
    display: none;
  }
  .anomaly-tag.visible { display: block; }

  /* ── Agent panel ── */
  .agent-panel {
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .agent-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .agent-status {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--muted);
    margin-top: 6px;
    font-family: var(--mono);
  }

  .agent-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
  }
  .agent-dot.thinking { background: var(--yellow); animation: pulse 0.8s infinite; }
  .agent-dot.responded { background: var(--green); }

  .agent-feed {
    flex: 1; overflow-y: auto;
    padding: 16px;
    display: flex; flex-direction: column;
    gap: 12px;
  }

  /* Scrollbar */
  .agent-feed::-webkit-scrollbar { width: 4px; }
  .agent-feed::-webkit-scrollbar-track { background: transparent; }
  .agent-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .feed-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 12px;
    color: var(--muted);
    font-size: 12px; text-align: center;
  }

  .feed-empty .icon { font-size: 36px; opacity: 0.3; }

  /* Agent response card */
  .response-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .response-card.CRITICAL { border-color: rgba(255,59,92,0.3); }
  .response-card.WARNING  { border-color: rgba(255,184,0,0.25); }

  .response-header {
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .response-machine {
    font-family: var(--mono); font-size: 12px;
    font-weight: 600; color: #fff;
    display: flex; align-items: center; gap: 8px;
  }

  .sev-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .sev-dot.CRITICAL { background: var(--red); box-shadow: 0 0 5px var(--red); }
  .sev-dot.WARNING  { background: var(--yellow); }

  .response-time {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
  }

  .response-anomaly {
    padding: 6px 14px;
    font-size: 10px; color: var(--yellow);
    font-family: var(--mono);
    letter-spacing: 0.5px;
    background: rgba(255,184,0,0.04);
    border-bottom: 1px solid var(--border);
  }

  .response-body {
    padding: 12px 14px;
    font-size: 12px; line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .thinking-card {
    background: rgba(0,212,255,0.04);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 11px; color: var(--accent);
    animation: slideIn 0.3s ease;
  }

  /* Stats bar */
  .stats-bar {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 20px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.2);
  }

  .stat { text-align: center; }
  .stat-val { font-family: var(--mono); font-size: 16px; font-weight: 600; color: #fff; }
  .stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; margin-top: 2px; }

  /* Scrollbars */
  .machines-panel::-webkit-scrollbar { width: 4px; }
  .machines-panel::-webkit-scrollbar-track { background: transparent; }
  .machines-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔬</div>
    <div>
      <div class="logo-text">FabGuardian</div>
      <div class="logo-sub">Semiconductor Fab Monitor</div>
    </div>
  </div>
  <div class="header-right">
    <div class="conn-badge">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">Connecting…</span>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="main">

  <!-- ── Left: Machines ── -->
  <div class="machines-panel">
    <div class="panel-title">Live Equipment Status</div>
    <div class="machines-grid" id="machinesGrid">
      <!-- Cards injected by JS -->
    </div>
  </div>

  <!-- ── Right: Agent feed ── -->
  <div class="agent-panel">
    <div class="agent-header">
      <div class="panel-title" style="margin-bottom:6px">AI Agent Feed</div>
      <div class="agent-status">
        <div class="agent-dot" id="agentDot"></div>
        <span id="agentStatus">Monitoring for anomalies…</span>
      </div>
    </div>

    <div class="agent-feed" id="agentFeed">
      <div class="feed-empty" id="feedEmpty">
        <div class="icon">🤖</div>
        <div>FabGuardian_Orchestrator is watching<br>all machines for anomalies.</div>
        <div style="font-size:11px;margin-top:4px">Agent will auto-trigger when<br>a WARNING or CRITICAL is detected.</div>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-val" id="statAnomalies">0</div>
        <div class="stat-lbl">ANOMALIES</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statAgentCalls">0</div>
        <div class="stat-lbl">AGENT CALLS</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statWorkOrders">0</div>
        <div class="stat-lbl">WORK ORDERS</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── State ──
const machines  = ["CMP-01", "LITHO-01", "ETCH-02", "CVD-03"];
const typeLabel = { "CMP-01":"Chemical Mechanical Polish", "LITHO-01":"Lithography", "ETCH-02":"Plasma Etch", "CVD-03":"CVD Furnace" };
const history   = Object.fromEntries(machines.map(m => [m, []]));
const charts    = {};
let   anomalyCount = 0, agentCallCount = 0, workOrderCount = 0;

// ── Clock ──
function updateClock() {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// ── Build machine cards ──
const grid = document.getElementById("machinesGrid");

machines.forEach(mid => {
  const card = document.createElement("div");
  card.className = "machine-card";
  card.id = `card-${mid}`;
  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="machine-id">${mid}</div>
        <div class="machine-type">${typeLabel[mid]}</div>
      </div>
      <div class="status-badge NORMAL" id="badge-${mid}">NORMAL</div>
    </div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">AIR TEMP</div>
        <div class="metric-value" id="m-airtemp-${mid}">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">PROC TEMP</div>
        <div class="metric-value" id="m-proctemp-${mid}">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">RPM</div>
        <div class="metric-value" id="m-rpm-${mid}">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">TORQUE</div>
        <div class="metric-value" id="m-torque-${mid}">—</div>
      </div>
    </div>
    <div class="wear-section">
      <div class="wear-label">
        <span>TOOL WEAR</span>
        <span id="m-wear-${mid}">—</span>
      </div>
      <div class="wear-bar">
        <div class="wear-fill" id="wearfill-${mid}" style="width:0%"></div>
      </div>
    </div>
    <div class="anomaly-tag" id="anomtag-${mid}"></div>
    <div class="mini-chart">
      <canvas id="chart-${mid}" height="50"></canvas>
    </div>
    <div class="thinking-overlay" id="thinking-${mid}">
      <span>Agent analysing</span>
      <div class="thinking-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  grid.appendChild(card);

  // Init mini chart
  const ctx = document.getElementById(`chart-${mid}`).getContext("2d");
  charts[mid] = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        data: [],
        borderColor: "#00d4ff",
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.4,
        fill: true,
        backgroundColor: "rgba(0,212,255,0.05)",
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { display: false },
        y: { display: false, grace: "10%" }
      }
    }
  });
});


// ── Update a machine card ──
function updateCard(r) {
  const mid    = r.machine_id;
  const status = r.status;

  const card  = document.getElementById(`card-${mid}`);
  const badge = document.getElementById(`badge-${mid}`);

  // Status class
  card.className  = `machine-card ${status !== "NORMAL" ? status.toLowerCase() : ""}`;
  badge.className = `status-badge ${status}`;
  badge.textContent = status;

  // Metrics
  const setVal = (id, val, warn, crit) => {
    const el = document.getElementById(id);
    el.textContent = val;
    el.className = `metric-value ${val >= crit ? "crit" : val >= warn ? "warn" : ""}`;
  };

  document.getElementById(`m-airtemp-${mid}`).textContent  = r.air_temperature_k.toFixed(1) + " K";
  document.getElementById(`m-proctemp-${mid}`).textContent = r.process_temperature_k.toFixed(1) + " K";

  const rpmEl = document.getElementById(`m-rpm-${mid}`);
  rpmEl.textContent = Math.round(r.rotational_speed_rpm);
  rpmEl.className = `metric-value ${r.rotational_speed_rpm < 1100 ? "crit" : r.rotational_speed_rpm < 1300 ? "warn" : ""}`;

  const torqEl = document.getElementById(`m-torque-${mid}`);
  torqEl.textContent = r.torque_nm.toFixed(1) + " Nm";
  torqEl.className = `metric-value ${r.torque_nm > 70 ? "crit" : r.torque_nm > 60 ? "warn" : ""}`;

  // Wear bar
  const wearPct = Math.min(100, (r.tool_wear_min / 250) * 100);
  document.getElementById(`m-wear-${mid}`).textContent = r.tool_wear_min.toFixed(0) + " / 250 min";
  const fill = document.getElementById(`wearfill-${mid}`);
  fill.style.width = wearPct + "%";
  fill.style.background = wearPct > 85 ? "var(--red)" : wearPct > 65 ? "var(--yellow)" : "var(--green)";

  // Anomaly tag
  const tag = document.getElementById(`anomtag-${mid}`);
  if (r.anomaly_type) {
    tag.textContent = "⚠ " + r.anomaly_type.replace(/_/g, " ").toUpperCase() + " DETECTED";
    tag.className = "anomaly-tag visible";
    anomalyCount++;
    document.getElementById("statAnomalies").textContent = anomalyCount;
  } else {
    tag.className = "anomaly-tag";
  }

  // Mini chart — track RPM
  history[mid].push(r.rotational_speed_rpm);
  if (history[mid].length > 30) history[mid].shift();
  charts[mid].data.labels = history[mid].map((_, i) => i);
  charts[mid].data.datasets[0].data = [...history[mid]];
  charts[mid].data.datasets[0].borderColor = status === "CRITICAL" ? "#ff3b5c" : status === "WARNING" ? "#ffb800" : "#00d4ff";
  charts[mid].data.datasets[0].backgroundColor = status === "CRITICAL" ? "rgba(255,59,92,0.05)" : "rgba(0,212,255,0.05)";
  charts[mid].update("none");
}


// ── Agent feed ──
function addThinkingCard(payload) {
  document.getElementById("feedEmpty").style.display = "none";
  document.getElementById(`thinking-${payload.machine_id}`).classList.add("active");

  const dot = document.getElementById("agentDot");
  dot.className = "agent-dot thinking";
  document.getElementById("agentStatus").textContent = `Analysing ${payload.machine_id}…`;

  const feed = document.getElementById("agentFeed");
  const card = document.createElement("div");
  card.className = "thinking-card";
  card.id = `thinking-card-${payload.machine_id}`;
  card.innerHTML = `
    <div class="thinking-dots"><span></span><span></span><span></span></div>
    <span>FabGuardian_Orchestrator analysing ${payload.machine_id} — ${payload.anomaly_type.replace(/_/g," ").toUpperCase()}…</span>
  `;
  feed.appendChild(card);
  feed.scrollTop = feed.scrollHeight;
  agentCallCount++;
  document.getElementById("statAgentCalls").textContent = agentCallCount;
}

function addResponseCard(payload) {
  // Remove thinking card
  const tc = document.getElementById(`thinking-card-${payload.machine_id}`);
  if (tc) tc.remove();
  document.getElementById(`thinking-${payload.machine_id}`).classList.remove("active");

  const dot = document.getElementById("agentDot");
  dot.className = "agent-dot responded";
  document.getElementById("agentStatus").textContent = `Last response: ${payload.machine_id}`;

  // Count work orders in response
  const woMatches = (payload.agent_response || "").match(/WO-[A-F0-9]{8}/g);
  if (woMatches) {
    workOrderCount += woMatches.length;
    document.getElementById("statWorkOrders").textContent = workOrderCount;
  }

  const ts = new Date(payload.timestamp * 1000).toLocaleTimeString();
  const feed = document.getElementById("agentFeed");
  const card = document.createElement("div");
  card.className = `response-card ${payload.status}`;
  card.innerHTML = `
    <div class="response-header">
      <div class="response-machine">
        <div class="sev-dot ${payload.status}"></div>
        ${payload.machine_id}
      </div>
      <div class="response-time">${ts}</div>
    </div>
    <div class="response-anomaly">⚠ ${(payload.anomaly_type||"").replace(/_/g," ").toUpperCase()}</div>
    <div class="response-body">${payload.agent_response || "No response received."}</div>
  `;
  feed.appendChild(card);
  feed.scrollTop = feed.scrollHeight;
}


// ── SSE connection ──
function connectSSE() {
  const dot   = document.getElementById("connDot");
  const label = document.getElementById("connLabel");

  const es = new EventSource("/stream");

  es.onopen = () => {
    dot.className   = "conn-dot live";
    label.textContent = "LIVE";
  };

  es.onerror = () => {
    dot.className   = "conn-dot error";
    label.textContent = "Reconnecting…";
    setTimeout(connectSSE, 3000);
    es.close();
  };

  es.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    switch (msg.type) {
      case "sensor":
        updateCard(msg.payload);
        break;
      case "agent_thinking":
        addThinkingCard(msg.payload);
        break;
      case "agent_response":
        addResponseCard(msg.payload);
        break;
      case "heartbeat":
        // keep alive
        break;
    }
  };
}

connectSSE();
</script>
</body>
</html>
